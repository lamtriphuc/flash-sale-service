spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/flash_sale
    username: postgres
    password: 111
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin

jwt:
  secret: MySuperSecretKeyForJwtAuthentication123456789!@#
  expirationMs: 86400000

crypto:
  aes:
    secret: MySuperSecretKeyForAes2561234567

server:
  port: 8080